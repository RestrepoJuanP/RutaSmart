<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Módulo Finanzas{% endblock %}</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  />
  <style>
    body {
      background-color: #f8f9fa;
    }
    .navbar-brand {
      font-weight: 700;
      letter-spacing: .5px;
    }
    .card-stat .display-6 {
      font-weight: 700;
    }
    .badge-pendiente  { background-color: #ffc107; color: #212529; }
    .badge-aprobado   { background-color: #198754; }
    .badge-rechazado  { background-color: #dc3545; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand" href="{% url 'finanzas:dashboard' %}">🚌 Finanzas – Acudiente</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'finanzas:dashboard' %}">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'finanzas:historial' %}">Comprobantes</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'finanzas:gastos_historial' %}">Gastos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link btn btn-sm btn-outline-light ms-2" href="{% url 'finanzas:gastos_registrar' %}">+ Gasto</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container">
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
