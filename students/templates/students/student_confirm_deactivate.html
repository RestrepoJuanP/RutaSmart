{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body">
                <h3 class="text-danger">Desactivar Estudiante</h3>
                <p>¿Estás seguro que deseas marcar?<strong>{{ student.full_name }}</strong> Como inactivo?</p>
                <p class="text-muted mb-4">Este estudiante ya no aparecerá en la lista de estudiantes activos.</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'student_list' %}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-danger">Confirmar Desactivación</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
