<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RutaSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --rs-navy: #06245c;
            --rs-blue: #0b83f6;
            --rs-ink: #021d49;
            --bs-primary: var(--rs-blue);
            --bs-primary-rgb: 11, 131, 246;
            --bs-link-color: var(--rs-blue);
            --bs-link-hover-color: var(--rs-navy);
        }
        .rs-navbar { background: var(--rs-navy); }
        .btn-primary {
            --bs-btn-bg: var(--rs-blue);
            --bs-btn-border-color: var(--rs-blue);
            --bs-btn-hover-bg: #076ed1;
            --bs-btn-hover-border-color: #076ed1;
            --bs-btn-active-bg: var(--rs-navy);
            --bs-btn-active-border-color: var(--rs-navy);
        }
        .rs-brand {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            min-height: 58px;
            padding: 0.25rem 0.7rem;
            border-radius: 8px;
            background: #fff;
        }
        .rs-brand-logo {
            display: block;
            width: auto;
            height: 46px;
        }
        .rs-brand-text {
            color: var(--rs-ink);
            font-weight: 800;
            line-height: 1;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark rs-navbar">
    <div class="container">
        <a class="navbar-brand rs-brand m-0" href="{% url 'student_list' %}" aria-label="Inicio RutaSmart">
            <img class="rs-brand-logo" src="{% static 'img/logo-rutasmart-mark.png' %}" alt="">
            <span class="rs-brand-text">RutaSmart</span>
        </a>
    </div>
</nav>

<div class="container mt-4">

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
