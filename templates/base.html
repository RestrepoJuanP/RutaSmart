<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}RutaSmart{% endblock title %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'accounts:home' %}">RutaSmart</a>
            <div class="d-flex align-items-center gap-2">
                {% if user.is_authenticated %}
                    <span class="text-white small">{{ user.full_name }} - {{ user.get_role_display }}</span>
                    <form method="post" action="{% url 'accounts:logout' %}">
                        {% csrf_token %}
                        <button class="btn btn-sm btn-outline-light" type="submit">Cerrar sesión</button>
                    </form>
                {% else %}
                    <a class="btn btn-sm btn-light" href="{% url 'accounts:login' %}">Iniciar sesión</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info" role="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock content %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
