{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body">
                <h3 class="text-danger">Deactivate Student</h3>
                <p>Are you sure you want to mark <strong>{{ student.full_name }}</strong> as inactive?</p>
                <p class="text-muted mb-4">This student will no longer appear in the active students list.</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'student_list' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">Confirm Deactivation</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
