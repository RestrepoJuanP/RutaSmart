{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="mb-4">{{ title }}</h2>

                <form method="post">
                    {% csrf_token %}

                    {% if form.errors %}
                        <div class="alert alert-danger">
                            Por favor corrija los errores a continuación.
                        </div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label">Nombre Completo</label>
                        {{ form.full_name }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Dirección</label>
                        {{ form.address }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nombre del Tutor</label>
                        {{ form.guardian_name }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Teléfono del Tutor</label>
                        {{ form.guardian_phone }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email del Tutor</label>
                        {{ form.guardian_email }}
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'student_list' %}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">{{ button_text }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
